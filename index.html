<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
    overflow: hidden;
}

 html, body {
    touch-action: none;
    overscroll-behavior: none;
}
 
 .top-bar {
    height: 140px;
    background: white;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 3px solid #ddd;
    padding: 0 20px;
}

.mode-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 5px;
}

.mode-buttons button {
    padding: 6px 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #ddd;
}

/* Active button */
.mode-buttons button.active {
    background: #2f5aa8;
    color: white;
}    

.top-left {
    justify-self: start;
    font-size: 13px;
    color: #777;
    line-height: 1.4;
}

.top-center {
    text-align: center;
}

.top-center h1 {
    margin: 0;
    font-size: 52px;   /* bigger */
    letter-spacing: 2px;
    font-weight: 600;
    color: #2f5aa8;
}

.top-right {
    justify-self: end;
    align-self: center;   /* 👈 forces vertical center */
}

.top-bar button {
    font-size: 18px;
    margin: 0;
}
    
    .workspace-title {
    text-align: center;
    font-size: 36px;
    margin: 0 0 15px 0;
    color: #2f5aa8;
}

    .title-block {
    text-align: center;
}

.author-line {
    font-size: 12px;
    color: #999;
}

    
.center-panel {
    width: 40%;
    background: white;
    padding: 8px 20px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    justify-content: space-between;   /* 👈 KEY FIX */
    align-items: center;
}

body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: #f2f2f2;
}

    .main-title {
    text-align: center;
    font-size: 48px;
    margin: 20px 0;
    color: #2f5aa8;
    font-weight: 600;
    letter-spacing: 1px;
}
    
.container {
    display: flex;
    height: calc(100% - 140px);
    align-items: stretch;   /* 👈 THIS is the fix */
}
 
html, body {
    height: 100%;
    overflow: hidden;
}
 
/* LEFT PANEL */
.left-panel {
    width: 30%;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.section {
    padding: 10px;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* Tile grids (6 across) */
#letters,
#digraphs,
#otherLeft,
#rControlled,
#vowelTeams,
#otherRight {
    display: grid;
    grid-template-columns: repeat(6, 55px);
    justify-content: center;
    gap: 6px;
}

/* Color Sections */
.blue {
    background: #2f5aa8;
    color: white;
    flex: 1.4;
}

.green {
    background: #4caf50;
    color: white;
    flex: 0.9;
}

.purple {
    background: #6a4fa3;
    color: white;
    flex: 0.9;
}

.section h3 {
    margin-top: 0;
}

.section > div {
    flex: 1;
}

.tile {
    background: white;
    color: black;
    border-radius: 10px;
    font-size: 20px;
    cursor: grab;

    display: flex;
    align-items: center;
    justify-content: center;

    height: 50px;
}

.vowel {
    color: #d32f2f;
    font-weight: 600;
}

.silent-e {
    background-color: #bdbdbd;
    color: black;
}

h2 {
    text-align: center;
    margin: 12px 0;  /* consistent spacing */
}

/* SOUND CHIP BANK */
.chip-bank {
    display: grid;
    grid-template-columns: repeat(6, 65px);
    justify-content: center;
    gap: 12px;
    margin-bottom: 15px;
}

.sound-chip {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: #e53935;
    cursor: grab;
}

.chip-slot {
    width: 65px;
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* keeps empty slots from collapsing */
.chip-slot:empty::after {
    content: "";
    width: 65px;
    height: 65px;
    display: block;
}
    
/* TAP CIRCLES */
.circle-container {
    display: grid;
    grid-template-columns: repeat(6, 65px);
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}

.circle {
    width: 65px;
    height: 65px;
    border: 3px solid #999;
    border-radius: 50%;
    background: white;
}

/* MAP IT */
.map-boxes {
    display: grid;
    grid-template-columns: repeat(6, 65px);
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}

.map-box {
    width: 65px;
    height: 65px;
    border: 3px solid #999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
}

/* WRITE IT */
.write-area {
    position: relative;
    height: 180px;   /* gives room for wide spacing */
    width: 85%;
    margin-bottom: 20px;
    border: 3px solid #999;

    background:
        /* Top solid blue */
        linear-gradient(#1976d2, #1976d2) 0 40px / 100% 3px no-repeat,

        /* Middle dashed blue */
        repeating-linear-gradient(
            to right,
            #1976d2 0px,
            #1976d2 10px,
            transparent 10px,
            transparent 20px
        ) 0 90px / 100% 3px no-repeat,

        /* Bottom solid red */
        linear-gradient(#d32f2f, #d32f2f) 0 140px / 100% 3px no-repeat;

    background-color: white;
}

.writing-tools {
    position: absolute;
    bottom: 5px;
    right: 5px;
    display: flex;
    gap: 6px;
}

.writing-tools button {
    font-size: 14px;
    padding: 4px 8px;
}
    
#writingCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.clear-writing {
    position: absolute;
    bottom: 5px;
    right: 5px;
    font-size: 14px;
}

/* RIGHT PANEL */
.right-panel {
    width: 30%;
    display: flex;
    flex-direction: column;
    height: 100%;
}
    
.left-panel,
.center-panel,
.right-panel {
    display: flex;
    flex-direction: column;
    height: 100%;   /* 👈 forces equal height */
}
    
.orange {
    background: #f39c12;
    color: white;
    flex: 0.9;
}

.pink {
    background: #e91e63;
    color: white;
    flex: 1.4;
}

.darkpurple {
    background: #5e3c99;
    color: white;
    flex: 0.9;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    background: #2f5aa8;
    color: white;
    margin: 5px;
    cursor: pointer;
}

.button-row {
    text-align: center;
}

    .top-controls {
    position: absolute;
    top: 20px;
    right: 30px;
}

.top-controls button {
    font-size: 18px;
}

 .or-pattern {
    background-color: #fff4cc;  /* soft orange-yellow */
    color: black;
}

 .selected {
    outline: 3px solid #ffcc00;
}
 
.board-mode #app {
    transform: scale(0.75);
    transform-origin: top center;
}
 
</style>
</head>

<body>

<div id="app">
  
<div class="top-bar">

    <div class="top-left">
        <div>Created by Jen Shepherd © 2026</div>
        <div>Farragut Primary | Knox County Schools</div>
        <div>Based on Benchmark Word Building Routine</div>
    </div>

    <div class="top-center">
        <h1>Word Builder</h1>
        <div class="mode-buttons">
            <button id="tapBtn" onclick="setTapMode()">Tap to Move</button>
            <button id="dragBtn" onclick="setDragMode()">Drag & Drop</button>
        </div>
    </div>

    <div class="top-right">
        <button onclick="resetBoard()">Reset</button>
    </div>

</div>

<div class="container">

<div class="left-panel">

    <div class="section blue">
        <h3>Consonants & Vowels</h3>
        <div id="letters"></div>
    </div>

    <div class="section green">
        <h3>Common Consonant Digraphs</h3>
        <div id="digraphs"></div>
    </div>

    <div class="section purple">
        <h3>Other</h3>
        <div id="otherLeft"></div>
    </div>
</div>

<div class="center-panel">
    
    <h2>Tap It!</h2>

    <div class="chip-bank">
    <div class="chip-slot"><div class="sound-chip"></div></div>
    <div class="chip-slot"><div class="sound-chip"></div></div>
    <div class="chip-slot"><div class="sound-chip"></div></div>
    <div class="chip-slot"><div class="sound-chip"></div></div>
    <div class="chip-slot"><div class="sound-chip"></div></div>
    <div class="chip-slot"><div class="sound-chip"></div></div>
</div>

    <div class="circle-container">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <h2>Map It!</h2>
    <div class="map-boxes">
        <div class="map-box"></div>
        <div class="map-box"></div>
        <div class="map-box"></div>
        <div class="map-box"></div>
        <div class="map-box"></div>
        <div class="map-box"></div>
    </div>

    <h2>Write It!</h2>
   <div class="write-area">
    <canvas id="writingCanvas"></canvas>

    <div class="writing-tools">
        <button onclick="setPen()">Pen</button>
        <button onclick="setEraser()">Eraser</button>
        <button onclick="clearCanvas()">Clear</button>
    </div>
</div>
    
</div>

<div class="right-panel">
    
    <div class="section orange">
        <h3>r-Controlled Vowels</h3>
        <div id="rControlled"></div>
    </div>

    <div class="section pink">
        <h3>Vowel Teams</h3>
        <div id="vowelTeams"></div>
    </div>

    <div class="section darkpurple">
        <h3>Other</h3>
        <div id="otherRight"></div>
    </div>
</div>

</div>

<script>
 
/* WAIT UNTIL PAGE LOADS */
document.addEventListener("DOMContentLoaded", function() {
 
/* =========================
   TILE CREATION (UNCHANGED)
========================= */
function createTiles(list, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    container.innerHTML = "";

    list.forEach(text => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.draggable = true;

        if (text === "e_silent") {
            tile.textContent = "e";
            tile.classList.add("vowel", "silent-e");
        } else {
            tile.textContent = text;
         if (["ore","oar","oor"].includes(text)) {
    tile.classList.add("or-pattern");
}

            if (containerId === "letters" && ["a","e","i","o","u"].includes(text)) {
                tile.classList.add("vowel");
            }
        }

        tile.addEventListener("dragstart", dragStart);

        container.appendChild(tile);
    });
}

/* =========================
   DESKTOP DRAG SYSTEM
========================= */
function dragStart(e) {
    e.dataTransfer.setData("text", e.target.textContent);
}
document.addEventListener("dragstart", (e) => {
    if (e.target.classList.contains("tile")) {
        e.target.classList.add("dragging");
    }
});

 document.addEventListener("dragend", (e) => {
    if (e.target.classList.contains("tile")) {
        e.target.classList.remove("dragging");
    }
});
 
document.querySelectorAll(".map-box").forEach(function(box) {

    box.addEventListener("dragover", function(e) {
        e.preventDefault();
    });

    box.addEventListener("drop", function(e) {
        e.preventDefault();

        var text = e.dataTransfer.getData("text");
        var draggedTile = document.querySelector(".dragging");
        if (!text) return;

        var draggedTile = document.querySelector(".dragging");

        // MOVE tile if coming from another box
        if (draggedTile && draggedTile.parentElement.classList.contains("map-box")) {
            draggedTile.parentElement.innerHTML = "";
        if (box.children.length > 0) {
        box.innerHTML = "";
}
            box.appendChild(draggedTile);
            return;
        }

        // CREATE new tile if from bank
        if (box.children.length > 0) {
        box.innerHTML = "";
}

var tile = document.createElement("div");
tile.className = "tile";
tile.textContent = text;

      // keep formatting from original tile
if (draggedTile) {
    if (draggedTile.classList.contains("vowel")) {
        tile.classList.add("vowel");
    }
    if (draggedTile.classList.contains("silent-e")) {
        tile.classList.add("silent-e");
    }
    if (draggedTile.classList.contains("or-pattern")) {
        tile.classList.add("or-pattern");
    }
} 
     
tile.setAttribute("draggable", true);
tile.addEventListener("dragstart", dragStart);
     
box.appendChild(tile);
    });
});
     
/* =========================
   BOARD MODE (SAFE)
========================= */
let boardMode = false;
let selectedTile = null;

    window.setTapMode = function() {
    boardMode = true;
    document.body.classList.add("board-mode");

    document.getElementById("tapBtn").classList.add("active");
    document.getElementById("dragBtn").classList.remove("active");
};

window.setDragMode = function() {
    boardMode = false;
    document.body.classList.remove("board-mode");

    document.getElementById("dragBtn").classList.add("active");
    document.getElementById("tapBtn").classList.remove("active");
};

document.addEventListener("click", function(e) {

    if (!boardMode) return;

    const tile = e.target.closest(".tile");

    if (tile) {
        document.querySelectorAll(".tile").forEach(t => t.classList.remove("selected"));
        selectedTile = tile;
        tile.classList.add("selected");
        return;
    }

    const box = e.target.closest(".map-box");

    if (box && selectedTile) {

    // If moving from another box → MOVE it
    if (selectedTile.parentElement.classList.contains("map-box")) {
        const oldBox = selectedTile.parentElement;

        // only clear destination if it already has something
        if (box.children.length > 0) {
            box.innerHTML = "";
        }

        box.appendChild(selectedTile);
        oldBox.innerHTML = "";

    } else {
        // From tile bank → COPY

        // only clear if needed
        if (box.children.length > 0) {
            box.innerHTML = "";
        }

        const clone = selectedTile.cloneNode(true);

        // preserve formatting
        if (selectedTile.classList.contains("vowel")) {
            clone.classList.add("vowel");
        }
        if (selectedTile.classList.contains("silent-e")) {
            clone.classList.add("silent-e");
        }
        if (selectedTile.classList.contains("or-pattern")) {
            clone.classList.add("or-pattern");
        }

        clone.addEventListener("click", () => {
            selectedTile = clone;
        });

        box.appendChild(clone);
    }
}
});
    
/* =========================
   SOUND CHIPS (UNCHANGED)
========================= */
document.querySelectorAll(".chip-slot").forEach((slot, index) => {
    slot.id = "slot-" + index;

    const chip = slot.querySelector(".sound-chip");

    if (chip) {
        chip.id = "chip-" + index;
        chip.dataset.home = slot.id;

        chip.draggable = true;

        chip.addEventListener("dragstart", function(e) {
            e.dataTransfer.setData("chipId", this.id);
        });
    }
});

function setupDropZones(selector) {
    document.querySelectorAll(selector).forEach(zone => {
        zone.addEventListener("dragover", e => e.preventDefault());

        zone.addEventListener("drop", function(e) {
            e.preventDefault();

            const chipId = e.dataTransfer.getData("chipId");
            if (!chipId) return;

            const draggedChip = document.getElementById(chipId);

            if (this.querySelector(".sound-chip")) {
                const existingChip = this.querySelector(".sound-chip");
                const originalSlot = document.getElementById(existingChip.dataset.home);
                originalSlot.appendChild(existingChip);
            }

this.innerHTML = "";
this.appendChild(draggedChip);

// mark chip as no longer in slot
draggedChip.classList.remove("in-slot");
        });
    });
}

setupDropZones(".circle");
setupDropZones(".chip-slot");
 let selectedChip = null;

document.addEventListener("click", function(e) {

    if (!boardMode) return;

    // Select chip
    const chip = e.target.closest(".sound-chip");
    if (chip) {
        selectedChip = chip;
        return;
    }

    // Place chip into circle
    const circle = e.target.closest(".circle");
    if (circle && selectedChip) {

        // If circle already has a chip, send it back to its slot
        const existing = circle.querySelector(".sound-chip");
        if (existing) {
            const home = document.getElementById(existing.dataset.home);
            if (home) home.appendChild(existing);
        }

        circle.innerHTML = "";
        circle.appendChild(selectedChip);
    }

    // Send chip back to top row if tapping a slot
    const slot = e.target.closest(".chip-slot");
    if (slot && selectedChip) {
        slot.appendChild(selectedChip);
    }

});

/* =========================
   RESET
========================= */
window.resetBoard = function() {

    // Clear map boxes
    document.querySelectorAll(".map-box").forEach(box => {
        box.innerHTML = "";
    });

    // Reset sound chips properly
    document.querySelectorAll(".chip-slot").forEach((slot, index) => {
        const chip = document.getElementById("chip-" + index);
        if (chip) {
            slot.appendChild(chip);
        }
    });

    // Clear writing
    clearCanvas();
};
 
/* =========================
   TILE CONTENT (THIS WAS BREAKING)
========================= */
createTiles(
["a","b","c","d","e","f","g","h","i","j","k","l",
 "m","n","o","p","q","r","s","t","u","v","w","x","y","z","e_silent"],
"letters");

createTiles(["sh","th","ch","ph","wh","ck"],"digraphs");
createTiles(["ff","ll","ss","zz","ed","ing"],"otherLeft");

createTiles(["ar","er","ir","or","ur"],"rControlled");

createTiles(
["ai","ay","ee","ea","oa","ow","ie","igh","ue","ui","ew","oe",
 "aw","au","ou","oo","oi","oy","eigh","ey","ei",
 "ore","oar","oor"],
"vowelTeams");

createTiles(["dge","ng","nk","tch","qu","kn","wr","mb","gh","gn"],
"otherRight");

/* =========================
   WRITING TOOL
========================= */
const canvas = document.getElementById("writingCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let drawing = false;
let erasing = false;

window.setPen = () => erasing = false;
window.setEraser = () => erasing = true;

function startDraw(e) {
    drawing = true;
    draw(e);
}

function endDraw() {
    drawing = false;
    ctx.beginPath();
    ctx.globalCompositeOperation = "source-over";
}

function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

    ctx.lineCap = "round";

    if (erasing) {
        ctx.globalCompositeOperation = "destination-out";
        ctx.lineWidth = 25;
    } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
    }

    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchend", endDraw);
canvas.addEventListener("touchmove", draw);

window.clearCanvas = function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
};
    
setDragMode();
    
}); // END DOM LOAD

</script>
</div>
 
</body>
</html>
