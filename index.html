<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

.top-bar {
    height: 90px;
    background: white;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 3px solid #ddd;
    padding: 0 20px;
}

.top-left {
    justify-self: start;
    font-size: 13px;
    color: #777;
}

.top-center h1 {
    margin: 0;
    font-size: 52px;
    letter-spacing: 2px;
    color: #2f5aa8;
}

.top-right {
    justify-self: end;
}

.container {
    display: flex;
    height: calc(100vh - 90px);
    align-items: flex-end;
}

.left-panel, .right-panel {
    width: 30%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.center-panel {
    width: 40%;
    background: white;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.section {
    padding: 10px;
}

.blue { background: #2f5aa8; color: white; }
.green { background: #4caf50; color: white; }
.purple { background: #6a4fa3; color: white; }
.orange { background: #f39c12; color: white; }
.pink { background: #e91e63; color: white; }
.darkpurple { background: #5e3c99; color: white; }

.tile {
    background: white;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 22px;
    cursor: pointer;
    text-align: center;
}

.vowel { color: #d32f2f; }
.silent-e { background: #bdbdbd; }

#letters, #digraphs, #otherLeft, #rControlled, #vowelTeams, #otherRight {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
}

.chip-bank, .circle-container, .map-boxes {
    display: grid;
    grid-template-columns: repeat(6, 65px);
    gap: 12px;
    justify-content: center;
}

.circle, .map-box, .chip-slot {
    width: 65px;
    height: 65px;
}

.circle {
    border: 3px solid #999;
    border-radius: 50%;
}

.map-box {
    border: 3px solid #999;
    display: flex;
    align-items: center;
    justify-content: center;
}

.sound-chip {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: red;
}

.selected {
    outline: 3px solid #ffcc00;
}

.write-area {
    height: 180px;
    width: 85%;
    border: 3px solid #999;
    margin-bottom: 20px;
    position: relative;
}

</style>
</head>

<body>

<div class="top-bar">
    <div class="top-left">Created by Jen Shepherd © 2026</div>
    <div class="top-center"><h1>Word Builder</h1></div>
    <div class="top-right"><button onclick="resetBoard()">Reset</button></div>
</div>

<div class="container">

<div class="left-panel">
<div class="section blue"><h3>Letters</h3><div id="letters"></div></div>
</div>

<div class="center-panel">

<h2>Tap It</h2>
<div class="chip-bank">
<div class="chip-slot"><div class="sound-chip"></div></div>
<div class="chip-slot"><div class="sound-chip"></div></div>
<div class="chip-slot"><div class="sound-chip"></div></div>
<div class="chip-slot"><div class="sound-chip"></div></div>
<div class="chip-slot"><div class="sound-chip"></div></div>
<div class="chip-slot"><div class="sound-chip"></div></div>
</div>

<div class="circle-container">
<div class="circle"></div><div class="circle"></div><div class="circle"></div>
<div class="circle"></div><div class="circle"></div><div class="circle"></div>
</div>

<h2>Map It</h2>
<div class="map-boxes">
<div class="map-box"></div><div class="map-box"></div><div class="map-box"></div>
<div class="map-box"></div><div class="map-box"></div><div class="map-box"></div>
</div>

<h2>Write It</h2>
<div class="write-area"></div>

</div>

</div>

<script>

/* CREATE LETTER TILES */
function createTiles(list, containerId) {
    const container = document.getElementById(containerId);

    list.forEach(text => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = text;

        if (["a","e","i","o","u"].includes(text)) tile.classList.add("vowel");
        if (text === "e") tile.classList.add("silent-e");

        container.appendChild(tile);
    });
}

createTiles(["a","b","c","d","e","f","g","h","i","j","k","l",
"m","n","o","p","q","r","s","t","u","v","w","x","y","z"], "letters");

/* TOUCH-FRIENDLY TILE SYSTEM */

let selectedTile = null;

/* SELECT TILE */
document.addEventListener("click", (e) => {
    const tile = e.target.closest(".tile");
    if (!tile) return;

    document.querySelectorAll(".tile").forEach(t => t.classList.remove("selected"));

    selectedTile = tile;
    tile.classList.add("selected");
});

/* PLACE TILE */
document.querySelectorAll(".map-box").forEach(box => {
    box.addEventListener("click", () => {

        if (!selectedTile) return;

        // remove tile from old box if needed
        if (selectedTile.parentElement.classList.contains("map-box")) {
            selectedTile.parentElement.innerHTML = "";
        }

        box.innerHTML = "";

        const clone = selectedTile.cloneNode(true);

        clone.addEventListener("click", () => {
            selectedTile = clone;
        });

        box.appendChild(clone);
    });
});

/* RESET */

function resetBoard() {
    document.querySelectorAll(".map-box").forEach(box => box.innerHTML = "");
}

</script>

</body>
</html>
