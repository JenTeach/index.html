<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Visualizer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f8fafc;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
}

.controls {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

input {
  width: 80px;
  font-size: 20px;
  text-align: center;
}

button {
  padding: 10px;
  font-size: 16px;
  margin: 5px;
}

.box {
  border: 1px solid #ccc;
  padding: 15px;
  margin-top: 10px;
  background: white;
}

.circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #ede9fe;
  border: 3px solid #c4b5fd;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 20px;
}

.ten {
  width: 4px;
  height: 60px;
  background: green;
  margin: 2px;
}

.one {
  width: 10px;
  height: 10px;
  border: 2px solid blue;
  border-radius: 50%;
  margin: 2px;
}

.row {
  display: flex;
  align-items: center;
}

.correct { background: lightgreen; }
.wrong { background: pink; }

</style>
</head>

<body>

<div class="container">

<h1>2-Digit Addition</h1>

<div class="controls">
  <div>
    Addend 1<br>
    <input id="a">
  </div>

  <div>
    Addend 2<br>
    <input id="b">
  </div>

  <button onclick="reset()">Reset</button>
</div>

<div>
  <h2 id="equation"></h2>
  <input id="answer">
  <button onclick="check()">Submit</button>
  <div id="feedback"></div>
</div>

<div class="box" id="blocks"></div>

</div>

<script>
function getParts(n) {
  return {
    tens: Math.floor(n / 10),
    ones: n % 10
  };
}

function draw() {
  let a = Number(document.getElementById("a").value || 0);
  let b = Number(document.getElementById("b").value || 0);

  document.getElementById("equation").innerText =
    (a ? a : "") + (a ? " + " : "") + (b ? b : "") + (b ? " =" : "");

  let parts = getParts(a + b);

  let html = "<div class='circle'>" + (a + b) + "</div>";

  html += "<div class='row'>";
  for (let i = 0; i < parts.tens; i++) {
    html += "<div class='ten'></div>";
  }
  html += "</div>";

  html += "<div class='row'>";
  for (let i = 0; i < parts.ones; i++) {
    html += "<div class='one'></div>";
  }
  html += "</div>";

  document.getElementById("blocks").innerHTML = html;
}

function check() {
  let a = Number(document.getElementById("a").value || 0);
  let b = Number(document.getElementById("b").value || 0);
  let ans = Number(document.getElementById("answer").value);

  if (ans === a + b) {
    document.getElementById("feedback").innerText = "Correct!";
  } else {
    document.getElementById("feedback").innerText = "Try again!";
  }
}

function reset() {
  document.getElementById("a").value = "";
  document.getElementById("b").value = "";
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerText = "";
  draw();
}

document.getElementById("a").addEventListener("input", draw);
document.getElementById("b").addEventListener("input", draw);

</script>

</body>
</html>
